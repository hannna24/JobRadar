<!DOCTYPE html>
<html lang="en">
<head>
  <title>JobRadar AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>JobRadar AI</h1>
    <p>Enter your profile to get AI-matched job results</p>
    <div class="form-group">
      <label>Your Field</label>
      <input id="field" placeholder="e.g. Data Science" />
    </div>
    <div class="form-group">
      <label>Target Role</label>
      <input id="role" placeholder="e.g. ML Engineer" />
    </div>
    <div class="form-group">
      <label>Skills (comma-separated)</label>
      <input id="skills" placeholder="Python, SQL, TensorFlow" />
    </div>
    <div class="form-group">
      <label>Location</label>
      <input id="location" placeholder="e.g. London or Remote" />
    </div>
    <div class="form-group">
      <label>Experience Level</label>
      <select id="experience">
        <option value="junior">Junior</option>
        <option value="mid">Mid-level</option>
        <option value="senior">Senior</option>
      </select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="remote" /> Remote only</label>
    </div>
    <button id="search-btn">Find Jobs</button>
    <div id="results"></div>

    <div class="qa-section">
      <h2>Ask about your jobs</h2>
      <div class="qa-input">
        <input id="question" placeholder="Any remote Python jobs this week?" />
        <button id="ask-btn">Ask</button>
      </div>
      <div id="qa-answer"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body></html>
